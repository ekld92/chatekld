# Track 7.2 (optional half): the live provider round-trip smoke — the check
# that would have caught the 2026-07-02 wire-format P0 class (dotted tool
# names 400ing on OpenAI/Anthropic), which the mocked suite structurally
# cannot see.
#
# Key-gated and OFF by default: it runs only on manual dispatch (or the weekly
# schedule if you uncomment it) and only exercises providers whose API key
# secret is configured. test_llm.py's live tests self-skip when
# RUN_LIVE_PROVIDER_TESTS != 1 or a provider key is absent, so a missing
# secret degrades to a skip, never a failure. Costs real (tiny) API spend.
name: Live provider smoke

on:
  workflow_dispatch:
  # schedule:
  #   - cron: '0 6 * * 1'   # weekly, Monday 06:00 UTC — enable once keys are set

jobs:
  live-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            constraints.txt

      - name: Install Python dependencies (filtered)
        run: |
          grep -vE '^(pywebview|pyobjc|pyinstaller)' requirements.txt > requirements-ci.txt
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt -c constraints.txt
          # pytest lives in requirements-dev.txt, not requirements.txt — without
          # this the `python -m pytest` step below dies with "No module named
          # pytest" (the same defect that made the main CI gate a no-op).
          pip install -r requirements-dev.txt -c constraints.txt

      - name: Live provider round-trips
        env:
          RUN_LIVE_PROVIDER_TESTS: '1'
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: python -m pytest test_llm.py -q -k live
